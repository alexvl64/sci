# ============================================================
# Nginx — Configuration sparkcore.fund (site statique)
# Fichier : /etc/nginx/sites-available/sparkcore.fund
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name sparkcore.fund www.sparkcore.fund;

    # Redirection HTTP → HTTPS
    return 301 https://sparkcore.fund$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sparkcore.fund;

    # Redirection www → non-www (canonique)
    return 301 https://sparkcore.fund$request_uri;

    # Certificats SSL (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/sparkcore.fund/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sparkcore.fund/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sparkcore.fund;

    # ─── SSL ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/sparkcore.fund/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sparkcore.fund/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Racine du site ────────────────────────────────────
    root  /var/www/sparkcore.fund;
    index index.html;

    # ─── Encodage & charset ────────────────────────────────
    charset utf-8;

    # ─── Cache des assets statiques ────────────────────────
    location ~* \.(css|js|webp|png|svg|ico|woff2?|ttf|eot|jpg|jpeg|gif|json|xml|txt)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ─── Sécurité — headers HTTP ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"          always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ─── Blocage des fichiers sensibles ────────────────────
    location ~ \.(php)$ {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ─── Routes principales ────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ─── Pages d'erreur personnalisées ─────────────────────
    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    location = /403.html {
        internal;
        root /var/www/sparkcore.fund;
    }

    location = /404.html {
        internal;
        root /var/www/sparkcore.fund;
    }

    location = /500.html {
        internal;
        root /var/www/sparkcore.fund;
    }

    # ─── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/sparkcore.fund.access.log;
    error_log  /var/log/nginx/sparkcore.fund.error.log;
}
